fhir:
  systems:
    identifiers:
      base-url: "https://bzkf.github.io/zenzy-to-fhir/identifiers"
      patient-id: "${fhir.systems.identifiers.base-url}/patient-id"
      therapie-medication-request-id: "${fhir.systems.identifiers.base-url}/therapie-medication-request-id"
      therapie-medication-id: "${fhir.systems.identifiers.base-url}/therapie-medication-id"
      therapie-wirkstoff-medication-id: "${fhir.systems.identifiers.base-url}/therapie-wirkstoff-medication-id"
      therapie-traegerloesung-medication-id: "${fhir.systems.identifiers.base-url}/therapie-traegerloesung-medication-id"
      device-id: "${fhir.systems.identifiers.base-url}/device-id"
  profiles:
    # MII
    # @ignored
    versions:
      # renovate: datasource=npm depName=de.medizininformatikinitiative.kerndatensatz.medikation
      mii-medikation: "|2026.0.1"
    mii-medication: "https://www.medizininformatik-initiative.de/fhir/core/modul-medikation/StructureDefinition/Medication${fhir.profiles.versions.mii-medikation}"
    mii-medication-request: "https://www.medizininformatik-initiative.de/fhir/core/modul-medikation/StructureDefinition/MedicationRequest${fhir.profiles.versions.mii-medikation}"

zenzy-to-fhir:
  version: "0.1.10" # x-release-please-version
  mappings:
    wirkstoff:
      extra-path: ""
    provenance:
      enabled: false
